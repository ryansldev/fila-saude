name: 'fila-saude'
services:
  database:
    container_name: 'postgres-dev'
    image: "postgres:18.4-alpine3.24"
    env_file:
      - ../.env.development
    ports:
      - "5432:5432"
  database-test:
    container_name: 'postgres-test'
    image: "postgres:18.4-alpine3.24"
    env_file:
      - ../.env.test
    ports:
      - "5433:5432"